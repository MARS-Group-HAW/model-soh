  #    dockerfile: SOHTruckFuelAlternativeBox/Dockerfile
  mars_postgis:
    image: imresamu/postgis:17-3.6.0alpha1-alpine
    container_name: mars_postgis
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER}
    ports:
      - "5432:5432"
    volumes:
      - ./my_postgis_storage:/var/lib/postgresql/data
    restart: unless-stopped
