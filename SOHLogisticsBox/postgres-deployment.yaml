# postgres-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: Username-default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: mars_user
            - name: POSTGRES_USER
              value: mars_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mars-db-secret
                  key: password
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
              
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
